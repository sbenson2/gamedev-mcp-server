name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Verify dist output exists
        run: test -f dist/index.js

      - name: TypeScript strict check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Verify package can be packed
        run: npm pack --dry-run

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Check formatting (if prettier configured)
        run: npx prettier --check "src/**/*.ts" || true

      - name: Lint (if eslint configured)
        run: npx eslint "src/**/*.ts" 2>/dev/null || true

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Check for known vulnerabilities
        run: npm audit --omit=dev || true
